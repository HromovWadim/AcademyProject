<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Курсы</title>
</head>
<body>
<h1>Список курсов</h1>
    <ul>
        {% for course in courses %}
            <li>
                <strong>{{ course.name }}</strong>: {{ course.description }} <br>
                Преподаватель: {{ course.teacher.first_name }} {{ course.teacher.last_name }} <br>

            </li>
            <hr>
        {% empty %}

        {% endfor %}
    </ul>
</body>
</html>
